[flake8]
max-line-length = 120
# E501: line too long (redundant with max-line-length)
# W503/W504: conflicting line-break-around-binary-operator rules; W503 is PEP8 preferred
extend-ignore = E501,W503,W504
exclude =
    .git,
    __pycache__,
    node_modules,
    .venv,
    deployment/api_deployment_package,
    deployment/deployment_package,
    deployment_package_full,
    htmlcov,
    *.egg-info
